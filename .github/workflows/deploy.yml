name: Deploy Website to DreamHost

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Install dependencies
      working-directory: new-prasmesti
      run: npm install

    - name: 🏗️ Build React app
      working-directory: new-prasmesti
      run: npm run build

    - name: 📁 Prepare deploy directory
      run: |
        mkdir -p _deploy
        rsync -a --exclude=new-prasmesti --exclude=_deploy --exclude=.git --exclude=.github . _deploy/
        cp -r new-prasmesti/dist _deploy/new-prasmesti

    - name: 🚀 SFTP Deploy
      uses: wlixcc/SFTP-Deploy-Action@v1.2.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 22
        local_path: ./_deploy/
        remote_path: /home/dh_33tuig/aleoss2.dreamhosters.com/
        sftp_only: true
