name: Deploy Website to DreamHost

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Install dependencies
      working-directory: new-prasmesti
      run: npm install

    - name: 🏗️ Build React app
      working-directory: new-prasmesti
      run: npm run build

    - name: 📁 Replace source with built files
      run: |
        cp -r new-prasmesti/dist/. new-prasmesti-built/
        rm -rf new-prasmesti
        mv new-prasmesti-built new-prasmesti

    - name: 🚀 SFTP Deploy
      uses: wlixcc/SFTP-Deploy-Action@v1.2.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 22
        remote_path: /home/dh_33tuig/aleoss2.dreamhosters.com/
        sftp_only: true
